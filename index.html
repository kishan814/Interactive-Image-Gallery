<footer>

    <div id="imageModal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; flex-direction: column; cursor: pointer;">
        <span style="position: absolute; top: 20px; right: 30px; font-size: 50px; color: #d4af37; font-weight: bold;">&times;</span>
        <img id="modalImg" style="max-width: 90%; max-height: 80%; border: 2px solid #d4af37; border-radius: 10px; box-shadow: 0 0 30px rgba(212, 175, 55, 0.5);">
        <div id="caption" style="margin-top: 20px; color: #d4af37; font-size: 24px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px;"></div>
    </div>

    <script>
        const modal = document.getElementById("imageModal");
        const modalImg = document.getElementById("modalImg");
        const captionText = document.getElementById("caption");

        document.querySelectorAll('.gallery-container img').forEach(img => {
            img.onclick = function() {
                modal.style.display = "flex";
                modalImg.src = this.src;
                captionText.innerHTML = this.alt;
            }
        });

        modal.onclick = function() {
            modal.style.display = "none";
        }
    </script>
